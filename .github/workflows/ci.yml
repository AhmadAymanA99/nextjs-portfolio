name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
